<svg width="480" height="200" viewBox="0 0 480 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Opulync CRM Logo</title>
  <desc>Opulync brand logo featuring a violet geometric mark and wordmark</desc>

  <defs>
    <style>
      .brand-name { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 700; font-size: 52px; letter-spacing: -1.5px; fill: #3C3489; }
      .brand-tag  { font-family: 'Helvetica Neue', Arial, sans-serif; font-weight: 400; font-size: 15px; letter-spacing: 4px; fill: #7F77DD; }
    </style>
  </defs>

  <!-- Outer ring -->
  <circle cx="95" cy="100" r="56" fill="none" stroke="#534AB7" stroke-width="6" opacity="0.18"/>

  <!-- Center violet circle -->
  <circle cx="95" cy="100" r="22" fill="#534AB7"/>

  <!-- Orbiting node top-right -->
  <circle cx="132" cy="67" r="10" fill="#7F77DD"/>
  <line x1="108" y1="82" x2="126" y2="73" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Orbiting node right -->
  <circle cx="147" cy="108" r="7" fill="#AFA9EC"/>
  <line x1="117" y1="103" x2="140" y2="107" stroke="#AFA9EC" stroke-width="2" stroke-linecap="round"/>

  <!-- Orbiting node bottom -->
  <circle cx="112" cy="143" r="8" fill="#7F77DD"/>
  <line x1="102" y1="121" x2="109" y2="136" stroke="#7F77DD" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Orbiting node left-top -->
  <circle cx="55" cy="70" r="9" fill="#AFA9EC"/>
  <line x1="75" y1="83" x2="62" y2="75" stroke="#AFA9EC" stroke-width="2" stroke-linecap="round"/>

  <!-- Orbiting node left-bottom -->
  <circle cx="53" cy="125" r="6" fill="#CECBF6"/>
  <line x1="73" y1="114" x2="57" y2="122" stroke="#CECBF6" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Inner dot -->
  <circle cx="95" cy="100" r="7" fill="#EEEDFE"/>

  <!-- Wordmark -->
  <text x="178" y="118" class="brand-name">Opulync</text>

  <!-- Divider -->
  <rect x="180" y="128" width="44" height="2" rx="1" fill="#7F77DD" opacity="0.4"/>

  <!-- Tagline -->
  <text x="183" y="148" class="brand-tag">CRM PLATFORM</text>
</svg>
